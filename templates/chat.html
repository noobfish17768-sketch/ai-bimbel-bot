<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body {
            margin:0;
            display:flex;
            font-family: Arial;
        }

        .sidebar {
            width: 300px;
            background: #111;
            color: white;
            height: 100vh;
        }

        .chat {
            flex:1;
            display:flex;
            flex-direction:column;
            height:100vh;
        }

        .header {
            padding:15px;
            border-bottom:1px solid #ddd;
            font-weight:bold;
        }

        .messages {
            flex:1;
            padding:20px;
            overflow-y:auto;
            background:#f5f6fa;
        }

        .msg-user {
            background:#dcf8c6;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
            max-width:60%;
        }

        .msg-bot {
            background:#fff;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
            max-width:60%;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="padding:15px;">💬 Chat</h3>
</div>

<div class="chat">
    <div class="header">
        User: {{ external_id }}
    </div>

    <div class="messages">
        {% for c in chats %}
            <div class="msg-user">
                👤 {{ c.message }}
            </div>

            <div class="msg-bot">
                🤖 {{ c.response }}
            </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
