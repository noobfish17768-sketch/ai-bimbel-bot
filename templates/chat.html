<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body {
            margin:0;
            display:flex;
            font-family: Arial;
            height:100vh;
        }

        .sidebar {
            width:300px;
            background:#111;
            color:white;
            padding:15px;
        }

        .chat {
            flex:1;
            display:flex;
            flex-direction:column;
        }

        .header {
            padding:15px;
            border-bottom:1px solid #ddd;
            font-weight:bold;
            background:white;
        }

        .messages {
            flex:1;
            padding:20px;
            overflow-y:auto;
            background:#f5f6fa;
        }

        .msg-user {
            background:#dcf8c6;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
            max-width:70%;
        }

        .msg-bot {
            background:#fff;
            padding:10px;
            border-radius:10px;
            margin-bottom:10px;
            max-width:70%;
            margin-left:auto;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>💬 Chat List</h3>
</div>

<div class="chat">

    <div class="header">
        User: {{ external_id }}
    </div>

    <div class="messages">
        {% for c in chats %}
            <div class="msg-user">👤 {{ c.message }}</div>
            <div class="msg-bot">🤖 {{ c.response }}</div>
        {% endfor %}
    </div>

</div>

</body>
</html>
