<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex h-screen bg-gray-100">

<!-- SIDEBAR -->
<div class="w-72 bg-gray-900 text-white p-4">
    <h3 class="font-bold text-lg">💬 Chat List</h3>
</div>

<!-- CHAT AREA -->
<div class="flex-1 flex flex-col">

    <!-- HEADER -->
    <div class="p-4 border-b bg-white font-semibold">
        User: {{ external_id }}
    </div>

    <!-- MESSAGES -->
    <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3">

        {% for c in chats %}
            <div class="flex justify-start">
                <div class="bg-gray-200 p-3 rounded-lg max-w-xs">
                    {{ c.message }}
                </div>
            </div>

            <div class="flex justify-end">
                <div class="bg-blue-500 text-white p-3 rounded-lg max-w-xs">
                    {{ c.response }}
                </div>
            </div>
        {% endfor %}

    </div>

</div>

<!-- AUTO SCROLL -->
<script>
const chatBox = document.getElementById("chat-box");
if (chatBox) {
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
