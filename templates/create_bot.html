<!DOCTYPE html>
<html>
<head>
    <title>Create Bot</title>
</head>
<body>

<h1>Buat Bot Baru</h1>

<form onsubmit="event.preventDefault(); createBot();">
    <input id="bot_name" type="text" placeholder="Nama Bot" required><br><br>

    <input id="bot_token" type="text" placeholder="Token Telegram" required><br><br>

    <select id="persona">
        <option value="bimbel">Bimbel</option>
        <option value="curhat">Curhat</option>
        <option value="jualan">Jualan</option>
    </select>

    <textarea id="prompt" placeholder="System Prompt"></textarea><br><br>

    <!-- 🔥 penting: bukan submit -->
    <button type="button" onclick="createBot()">Create Bot</button>
</form>

<!-- 🔥 WAJIB: load JS kamu -->
<script src="/static/dashboard.js"></script>

</body>
</html>
