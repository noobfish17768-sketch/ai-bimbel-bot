<!DOCTYPE html>
<html>
<head>
    <title>Create Bot</title>
</head>
<body>

<h1>Buat Bot Baru</h1>

<form onsubmit="event.preventDefault(); createBot();">
    <input type="text" name="name" placeholder="Nama Bot" required><br><br>

    <input type="text" name="telegram_token" placeholder="Token Telegram" required><br><br>

    <select name="persona_type">
        <option value="bimbel">Bimbel</option>
        <option value="curhat">Curhat</option>
        <option value="jualan">Jualan</option>
    </select>

    <textarea name="system_prompt" placeholder="System Prompt"></textarea><br><br>

    <button type="submit">Create Bot</button>
</form>

</body>
</html>
