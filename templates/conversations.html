<!DOCTYPE html>
<html>
<head>
    <title>Conversations</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            padding: 20px;
        }

        .topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .nav a {
            margin-right:10px;
            text-decoration:none;
        }

        table {
            width:100%;
            background:white;
            border-collapse:collapse;
            margin-top:20px;
        }

        th, td {
            padding:10px;
            border-bottom:1px solid #eee;
            vertical-align:top;
        }

        .user {
            background:#e3f2fd;
            padding:8px;
            border-radius:8px;
            margin-bottom:5px;
        }

        .bot {
            background:#f1f1f1;
            padding:8px;
            border-radius:8px;
        }

        .time {
            font-size:12px;
            color:gray;
        }

        .empty {
            margin-top:20px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h2>💬 Conversations</h2>

    <div class="nav">
        <a href="/dashboard">Leads</a>
        <a href="/conversations">Chats</a>
        <a href="/settings">Settings</a>
    </div>
</div>

{% if chats and chats|length > 0 %}

<table>
    <tr>
        <th>User ID</th>
        <th>Conversation</th>
        <th>Time</th>
    </tr>

    {% for chat in chats %}
    <tr>
        <td>{{ chat.user_id }}</td>

        <td>
            <div class="user">
                👤 {{ chat.message }}
            </div>

            <div class="bot">
                🤖 {{ chat.response }}
            </div>
        </td>

        <td class="time">
            {{ chat.created_at }}
        </td>
    </tr>
    {% endfor %}
</table>

{% else %}
    <p class="empty">Belum ada chat masuk</p>
{% endif %}

</body>
</html>
