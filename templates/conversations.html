<!DOCTYPE html>
<html>
<head>
    <title>Conversations</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        .topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        table {
            width:100%;
            background:white;
            margin-top:20px;
            border-collapse:collapse;
        }

        th, td {
            padding:10px;
            border-bottom:1px solid #eee;
            vertical-align:top;
        }

        .user {
            background:#e3f2fd;
            padding:8px;
            border-radius:8px;
            margin-bottom:5px;
        }

        .bot {
            background:#f1f1f1;
            padding:8px;
            border-radius:8px;
        }

        .time {
            font-size:12px;
            color:gray;
        }

        .empty {
            margin-top:20px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h2>💬 Conversations</h2>

    <div>
        <a href="/dashboard">Dashboard</a> |
        <a href="/settings">Settings</a> |
        <a href="/logout">Logout</a>
    </div>
</div>

{% if chats and chats|length > 0 %}

<table>
    <tr>
        <th>User</th>
        <th>Conversation</th>
        <th>Time</th>
    </tr>

    {% for chat in chats %}
    <tr>
        <td>{{ chat.external_id }}</td>

        <td>
            <div class="user">👤 {{ chat.message }}</div>
            <div class="bot">🤖 {{ chat.response }}</div>
        </td>

        <td class="time">{{ chat.created_at }}</td>
    </tr>
    {% endfor %}
</table>

{% else %}
<p class="empty">Belum ada chat</p>
{% endif %}

</body>
</html>
