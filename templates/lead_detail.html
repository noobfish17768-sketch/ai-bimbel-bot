<!DOCTYPE html>
<html>
<head>
    <title>Lead Detail</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="layout">

    <div class="sidebar">
        <h2>CRM</h2>
        <a href="/dashboard">Dashboard</a>
        <a href="/conversations">Chats</a>
        <a href="/settings">Settings</a>
    </div>

    <div class="main">

        <h2>Lead Detail</h2>

        <div class="card">
            <p>Nama: {{ lead.nama_orangtua }}</p>
            <p>Anak: {{ lead.nama_anak }}</p>
            <p>Umur: {{ lead.umur_anak }}</p>
            <p>WA: {{ lead.whatsapp }}</p>
            <p>Status: {{ lead.status }}</p>
            <p>Score: {{ lead.lead_score }}</p>
        </div>

        <div class="card">
            <form method="post">
                <textarea name="notes">{{ lead.notes }}</textarea>
                <button type="submit">Save</button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
