<!DOCTYPE html>
<html>
<head>
    <title>Admin Management</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        .card {
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        input {
            display:block;
            margin-bottom:10px;
            padding:10px;
            width:250px;
        }

        button {
            padding:10px 15px;
            border:none;
            border-radius:5px;
            background:#3498db;
            color:white;
            cursor:pointer;
        }

        table {
            width:100%;
            background:white;
            border-collapse:collapse;
        }

        th, td {
            padding:10px;
            border-bottom:1px solid #eee;
        }
    </style>
</head>

<body>

<h2>👑 Admin Management</h2>

<!-- ========================= -->
<!-- CREATE ADMIN -->
<!-- ========================= -->
<div class="card">
    <h3>Tambah Admin</h3>

    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password" type="password">
    <input id="telegram_id" placeholder="Telegram ID">

    <button onclick="createAdmin()">Create Admin</button>
</div>

<!-- ========================= -->
<!-- LIST ADMIN -->
<!-- ========================= -->
<div class="card">
    <h3>List Admin</h3>

    <table>
        <tr>
            <th>Username</th>
            <th>Telegram ID</th>
            <th>Role</th>
            <th>Status Bot</th>
        </tr>

        {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.telegram_id or "-" }}</td>
            <td>{{ u.role }}</td>
            <td>{{ "ON" if u.bot_active else "OFF" }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

<!-- ========================= -->
<!-- SCRIPT -->
<!-- ========================= -->
<script>
async function createAdmin() {

    const username = document.getElementById("username").value.trim()
    const password = document.getElementById("password").value.trim()
    const telegram_id = document.getElementById("telegram_id").value.trim()

    // 🔥 VALIDASI
    if (!username || !password || !telegram_id) {
        alert("Semua field wajib diisi")
        return
    }

    try {
        const res = await fetch("/api/admin/create", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                username,
                password,
                telegram_id
            })
        })

        const data = await res.json()

        if (data.success) {
            alert("Admin berhasil dibuat")
            location.reload()
        } else {
            alert(data.error || "Gagal membuat admin")
        }

    } catch (err) {
        console.error(err)
        alert("Server error")
    }
}
</script>

</body>
</html>
