<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Management</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>👑 Admin Management</h2>

<!-- ========================= -->
<!-- CREATE ADMIN -->
<!-- ========================= -->
<div class="card">
    <h3>Tambah Admin</h3>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <input id="telegram_id" placeholder="Telegram ID">

    <button onclick="createAdmin()">Create Admin</button>
</div>

<!-- ========================= -->
<!-- LIST ADMIN -->
<!-- ========================= -->
<div class="card">
    <h3>List Admin</h3>

    <table>
        <tr>
            <th>Username</th>
            <th>Telegram ID</th>
            <th>Role</th>
            <th>Status Bot</th>
            <th>Aksi</th>
        </tr>

        {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.telegram_id or "-" }}</td>
            <td>{{ u.role }}</td>
            <td>{{ "ON" if u.bot_active else "OFF" }}</td>
            <td>
                <button onclick="deleteAdmin('{{ u.id }}')">Hapus</button>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<!-- ========================= -->
<!-- SCRIPT -->
<!-- ========================= -->
<script>
async function createAdmin() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const telegram_id = document.getElementById("telegram_id").value.trim();

    if (!username || !password || !telegram_id) {
        alert("Semua field wajib diisi");
        return;
    }

    try {
        const res = await fetch("/api/admin/create", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: username,
                password: password,
                telegram_id: telegram_id
            })
        });

        const data = await res.json();

        if (data.success) {
            alert("Admin berhasil dibuat");
            location.reload();
        } else {
            alert(data.error || "Gagal membuat admin");
        }

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

async function deleteAdmin(id) {

    if (!confirm("Yakin mau hapus admin ini?")) return;

    try {
        const res = await fetch("/api/admin/" + id, {
            method: "DELETE"
        });

        const data = await res.json();

        if (data.success) {
            alert("Admin deleted");
            location.reload();
        } else {
            alert(data.detail || "Error");
        }

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}
</script>

</body>
</html>
