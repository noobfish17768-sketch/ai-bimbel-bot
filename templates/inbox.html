<!DOCTYPE html>
<html>
<head>
    <title>Inbox</title>
    <style>
        body { margin:0; display:flex; font-family:Arial; }

        .sidebar {
            width:300px;
            background:#111;
            color:white;
            height:100vh;
            overflow:auto;
        }

        .user {
            padding:15px;
            border-bottom:1px solid #333;
            cursor:pointer;
        }

        .user:hover { background:#222; }

        .main {
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            color:gray;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3 style="padding:15px;">Inbox</h3>

    {% for u in users %}
    <div class="user" onclick="window.location='/chat/{{u}}'">
        👤 {{ u }}
    </div>
    {% endfor %}
</div>

<div class="main">
    Pilih chat
</div>

</body>
</html>
