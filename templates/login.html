<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
            background:#f5f6fa;
        }

        .box {
            background:white;
            padding:30px;
            width:300px;
            border-radius:10px;
        }

        input {
            width:100%;
            padding:10px;
            margin-bottom:10px;
        }

        button {
            width:100%;
            padding:10px;
            background:#3498db;
            border:none;
            color:white;
        }

        .error {
            color:red;
            font-size:12px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        <input name="username" placeholder="username">
        <input name="password" type="password" placeholder="password">
        <button>Login</button>
    </form>

</div>

</body>
</html>
