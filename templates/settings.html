<!DOCTYPE html>
<html>
<head>
    <title>Bot Settings</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        .card {
            background:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        input {
            padding:10px;
            margin-top:10px;
            border-radius:5px;
            border:1px solid #ccc;
            width:100%;
        }

        button {
            margin-top:10px;
            padding:10px 15px;
            border:none;
            border-radius:5px;
            background:#3498db;
            color:white;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>⚙️ Bot Settings</h2>
<div class="topbar">
    <h2>💬 Conversations</h2>

    <div>
        <a href="/dashboard">Dashboard</a> |
        <a href="/settings">Settings</a> |
        <a href="/logout">Logout</a>
    </div>
</div>
<!-- ADD / UPDATE -->
<div class="card">
    <h3>Tambah / Update Setting</h3>

    <input type="text" id="key" placeholder="Key (contoh: greeting)">
    <input type="text" id="value" placeholder="Value">

    <button onclick="saveSetting()">Save</button>
</div>

<!-- LIST SETTINGS -->
<div class="card">
    <h3>Semua Settings</h3>

    <ul>
        {% for s in settings %}
            <li><b>{{ s.key }}</b> : {{ s.value }}</li>
        {% endfor %}
    </ul>
</div>

<script>
async function saveSetting() {
    const key = document.getElementById("key").value;
    const value = document.getElementById("value").value;

    if (!key || !value) {
        alert("Isi key & value dulu");
        return;
    }

    try {
        const res = await fetch("/api/settings", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ key, value })
        });

        const data = await res.json();

        if (data.success) {
            alert("Berhasil disimpan");
            location.reload();
        } else {
            alert(data.error || "Gagal simpan");
        }

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}
</script>

</body>
</html>
